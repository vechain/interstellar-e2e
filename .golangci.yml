version: "2"
run:
  tests: true
  timeout: 10m
linters:
  default: none
  enable:
    - bidichk
    - copyloopvar
    - durationcheck
    - gosec
    - govet
    - ineffassign
    - misspell
    - revive
    - staticcheck
    - unconvert
    - unused
    - whitespace
  settings:
    gosec:
      excludes:
        - G115
        - G406
        - G507
    revive:
      rules:
        - name: var-naming
          arguments:
            - []
            - []
            - - upperCaseConst: true
          severity: warning
          disabled: false
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
issues:
  max-issues-per-linter: 1000
formatters:
  enable:
    - goimports
    - gofmt
    - gofumpt
    - golines
  settings:
    gofmt:
      simplify: true
    goimports:
      local-prefixes:
        - github.com/vechain/interstellar-e2e
    golines:
      max-len: 160
      tab-len: 4
      shorten-comments: true
      reformat-tags: false
  exclusions:
    generated: lax
